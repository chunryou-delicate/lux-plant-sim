<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>볕 · 모듈 식물 생장 프로토타입 (몬스테라)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:'Gaegu',sans-serif;background:#14101c;
    user-select:none;color:#eceae3}
  #wrap{position:relative;width:100vw;height:100vh}
  #cv{position:absolute;inset:0;display:block}
  .top{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:10px;
    padding:14px 18px;pointer-events:none}
  .brand{font-family:'Jua';font-size:20px;color:#fff;letter-spacing:1px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .brand b{color:#7ad06a}
  .tag{font-family:'Gaegu';font-weight:700;font-size:12px;color:rgba(255,255,255,.5)}
  .views{position:absolute;left:16px;bottom:16px;z-index:6;display:flex;flex-wrap:wrap;gap:6px;max-width:200px}
  .cbtn{background:rgba(255,255,255,.92);border:none;border-radius:12px;padding:8px 13px;font-family:'Jua';
    font-size:13px;color:#3d3548;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.3)}
  .cbtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.3)}
  .cbtn.on{background:#7ad06a}
  .panel{position:absolute;top:12px;right:12px;z-index:6;width:min(790px,76vw);
    background:rgba(20,16,28,.8);backdrop-filter:blur(10px);border-radius:16px;padding:12px 14px;
    border:1px solid rgba(255,255,255,.1)}
  .phead{display:flex;justify-content:space-between;align-items:center;font-family:'Jua';font-size:15px;color:#7ad06a;margin-bottom:8px}
  .phead button{background:none;border:none;color:#7ad06a;font-family:'Jua';font-size:15px;cursor:pointer}
  .cols{display:flex;gap:12px;align-items:flex-start}
  .col{flex:1 1 0;min-width:0;max-height:calc(100vh - 150px);overflow-y:auto;padding-right:4px}
  .col::-webkit-scrollbar{width:6px} .col::-webkit-scrollbar-thumb{background:rgba(122,208,106,.4);border-radius:4px}
  .colhead{position:sticky;top:0;background:rgba(24,19,32,.97);font-family:'Jua';font-size:12px;color:#7ad06a;
    padding:3px 0 7px;margin-bottom:4px;z-index:2;border-bottom:1px solid rgba(255,255,255,.12)}
  .psec{font-family:'Jua';font-size:11px;color:#e8a838;margin:10px 0 6px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.1)}
  .prow{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.12)}
  .prow .cbtn{flex:1;font-size:12px;padding:8px}
  .note2{font-family:'Gaegu';font-weight:700;font-size:12px;color:rgba(255,255,255,.5);padding:14px 4px}
  #assetSel{width:100%;margin-bottom:8px;background:#241d30;color:#eceae3;border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:8px;font-family:'Gaegu';font-weight:700;font-size:13px}
  #assetSel option{background:#241d30;color:#eceae3}
  #assetPrev{width:100%;height:auto;aspect-ratio:248/150;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.12),rgba(255,255,255,.03));border-radius:10px;margin-bottom:8px;display:block}
  .panel h3{font-family:'Jua';font-size:14px;color:#7ad06a;margin-bottom:10px}
  .field{margin-bottom:10px}
  .field label{display:flex;justify-content:space-between;font-family:'Gaegu';font-weight:700;font-size:12px;
    color:rgba(255,255,255,.7);margin-bottom:5px}
  .field label b{color:#7ad06a;font-family:'Jua'}
  input[type=range]{-webkit-appearance:none;width:100%;height:7px;border-radius:6px;outline:none;
    background:linear-gradient(90deg,#2a3a2a,#7ad06a);cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 32%,#e8ffe0,#7ad06a);
    box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 3px rgba(255,255,255,.8)}
  #stat{font-family:'Gaegu';font-weight:700;font-size:12px;line-height:1.7;color:#cfe8d0;
    padding-top:8px;border-top:1px solid rgba(255,255,255,.12)}
  #stat .k{color:rgba(255,255,255,.5);font-weight:400}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="top">
    <span class="brand">볕<b>.</b></span>
    <span class="tag">모듈 식물 생장 · 몬스테라 프로토 (임시 도형)</span>
  </div>

  <div class="panel" id="panel">
    <div class="phead"><span>🌱 몬스테라 튜닝</span><button id="panelToggle">▾</button></div>
    <div id="panelBody">
      <div class="cols">
        <div class="col">
          <div class="colhead">▶ 플레이</div>
          <div class="field"><label>성장도 growth <b id="growthV">30</b></label><input type="range" id="growth" min="0" max="100" value="30"></div>
          <div class="field"><label>☀️ 빛 방위 <b id="lightV">90°</b></label><input type="range" id="light" min="0" max="360" value="90"></div>
          <div class="field"><label>굴광성(빛 쫓기) <b id="photoV">50%</b></label><input type="range" id="photo" min="0" max="100" value="50"></div>
          <button class="cbtn" id="btnSeed" style="width:100%">🎲 랜덤 시드</button>
          <div id="stat" style="margin-top:8px"><span class="k">슬라이더를 움직여 자라는 걸 보세요.</span></div>
        </div>
        <div class="col">
          <div class="colhead">전체 A · 생장 규칙</div>
          <div id="tab-global"></div>
        </div>
        <div class="col">
          <div class="colhead">에셋 B · 개별 조정</div>
          <select id="assetSel"></select>
          <canvas id="assetPrev" width="248" height="150"></canvas>
          <div id="assetSliders"></div>
        </div>
      </div>
      <div class="prow">
        <button class="cbtn" id="btnCopy">📋 설정 복사</button>
        <button class="cbtn" id="btnReset">↺ 리셋</button>
      </div>
    </div>
  </div>

  <div class="views">
    <button class="cbtn" data-dir="front">앞</button>
    <button class="cbtn" data-dir="left">좌</button>
    <button class="cbtn" data-dir="right">우</button>
    <button class="cbtn" data-dir="top">위</button>
    <button class="cbtn" id="btnAuto">자동회전</button>
    <button class="cbtn on" id="btnGrid">바닥격자</button>
  </div>
</div>

<script>
let scene, cam, renderer, grid, ground, sunMarker;
let W, H, DPR=Math.min(2, window.devicePixelRatio||1);
const cv=document.getElementById('cv');
let orbit={ az:Math.PI*0.22, el:0.42, r:14, zoom:1, tx:0, ty:1.1, tz:0 };
let autoRotate=false;
let FRUSTUM=2.2;

// ===== 시드 난수(개체성): 같은 시드→같은 그루. mulberry32 =====
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
let SEED=12345, rng=mulberry32(SEED);
const GOLDEN=Math.PI*(3-Math.sqrt(5));   // 137.5° 황금각(자연스러운 잎차례)

// ===== 튜닝 파라미터(A: 전체 규칙) — 슬라이더로 실시간 조절 =====
const DEF={
  spawnStep:10, maxLeaves:9, matSpan:30,                   // 성장 타이밍(잎 간격/최대/생애 길이)
  seedEnd:6, sproutEnd:14,                                 // 씨앗·새싹(줄기+말린잎) 시기
  budSpan:0.22, furlFrac:0.5, budSize:0.16,                // 새순: 말림(furled)→펴짐(opening) 비율·크기
  stageYoung:0.38, stageMid:0.66,                          // 잎 형태 전환 시점(어린→중간→성인)
  sizeYoung:0.20, sizeMid:0.45, sizeMature:0.78, sizeFull:1.25,  // 각 시점 크기(작게 나서 커짐)
  internode:0.24, thickSpan:50, thickScale:0.022, matureStemR:0.085, stemFlat:1.25,   // 줄기 (matureStemR=성인잎 최소굵기=thick, stemFlat=잎방향으로 납작)
  petioleLen:1.0, leafElev:1.02, elevDrop:0.34, spread:0.16, branchSpread:0.55, branchProb:0.14,  // 배치
  leafLight:0.58, leafDark:0.30, leafSat:0.55, satRange:0.22, hueBase:0.16, hueRange:0.26,   // 색(밝기/진함/채도/개체범위)
};
let P=Object.assign({}, DEF);

// ===== 튜닝 파라미터(B: 에셋별 개별 조정) =====
const ADJ_KEYS=['leaf_young','leaf_mid1','leaf_mid2','leaf_mature','bud_furled','bud_opening','bud_opening2','stem_thick','stem_main','stem_med','stem_thin','petiole'];
function defAdj(key){ const d={scale:1, rx:0,ry:0,rz:0, ox:0,oy:0,oz:0}; if(/^leaf_/.test(key)){ d.omin=0; d.omax=99; } return d; }  // omin/omax=사용 order 범위(잎만)
const DEF_ADJ={}; ADJ_KEYS.forEach(k=>DEF_ADJ[k]=defAdj(k));
let ADJ=JSON.parse(JSON.stringify(DEF_ADJ));

let GROWTH=30;
let LIGHT_AZ=Math.PI*0.5, PHOTO=0.5;   // 빛 방위(rad) · 굴광성 세기(0~1)

// ===== 재료 =====
const MAT={
  pot:  new THREE.MeshStandardMaterial({color:0xb87050, roughness:0.85}),
  soil: new THREE.MeshStandardMaterial({color:0x4a3826, roughness:1.0}),
  stem:  new THREE.MeshStandardMaterial({color:0x4c7a3a, roughness:0.7}),   // 줄기모듈 A(굵음)
  stem2: new THREE.MeshStandardMaterial({color:0x5e8a44, roughness:0.65}),  // 줄기모듈 B(가늘고 밝음)
  seed: new THREE.MeshStandardMaterial({color:0x8a6a4a, roughness:0.8}),
  // 잎 3종(성숙도별): 0 통잎(연두) · 1 살짝갈라짐 · 2 많이갈라짐(진초록)
  leaf:[ new THREE.MeshStandardMaterial({color:0x8fd06a, roughness:0.72, side:THREE.DoubleSide}),
         new THREE.MeshStandardMaterial({color:0x5fae4a, roughness:0.72, side:THREE.DoubleSide}),
         new THREE.MeshStandardMaterial({color:0x3d8a37, roughness:0.72, side:THREE.DoubleSide}) ],
};

// 잎 프로토(임시 도형). 밑면(자루)=원점, +Y 방향. GLB 나오면 여기만 교체.
//  type0 통잎  type1 살짝갈라진(각진)  type2 많이갈라진(손가락 팬=몬스테라 천공잎)
function makeLeaf(type){
  if(type===2){
    const g=new THREE.Group(), n=5;
    for(let k=0;k<n;k++){
      const fg=new THREE.ConeGeometry(0.075,0.52,6); fg.translate(0,0.26,0); fg.scale(1,1,0.4);
      const f=new THREE.Mesh(fg, MAT.leaf[2]); f.castShadow=true;
      const s=(k/(n-1))-0.5;                 // -0.5~0.5 손가락 벌림
      f.position.x=s*0.30; f.rotation.z=s*0.95; f.rotation.x=-0.05;
      g.add(f);
    }
    return g;
  }
  const geo = type===1 ? new THREE.ConeGeometry(0.30,0.56,6) : new THREE.ConeGeometry(0.25,0.48,12);
  geo.translate(0,type===1?0.28:0.24,0);
  geo.scale(1,1,0.30);
  const m=new THREE.Mesh(geo, MAT.leaf[type]); m.castShadow=true; return m;
}

let plantGroup;

// ===== 몬스테라 GLB 에셋 (assets/monstera/) =====
const ASSET_FILES={
  pot:'pot.glb',
  leaf_young:'monstera_leaf_young.glb', leaf_mid1:'monstera_leaf_mid1.glb',
  leaf_mid2:'monstera_leaf_mid2.glb', leaf_mature:'monstera_leaf_mature.glb',
  bud_furled:'monstera_bud_furled.glb', bud_opening:'monstera_bud_opening.glb', bud_opening2:'monstera_bud_opening2.glb',
  stem_thick:'monstera_stem_thick.glb', stem_main:'monstera_stem_main.glb',
  stem_med:'monstera_stem_med.glb', stem_thin:'monstera_stem_thin.glb',
  petiole:'monstera_petiole.glb'
};
const LONGY={stem_thick:1,stem_main:1,stem_med:1,stem_thin:1,petiole:1};  // 긴축→Y 정렬(줄기/잎자루)
const ANCHORB={leaf_young:1,leaf_mid1:1,leaf_mid2:1,leaf_mature:1,bud_furled:1,bud_opening:1,bud_opening2:1}; // 잎/새순: 밑동(자루끝)에 원점 스냅
const ASSETS={}; let ASSETS_READY=false;
let SOIL_Y=0.5;
const POT_H=0.6;          // 화분 높이(월드)
const USE_PETIOLE=true;   // 잎자루 GLB로 줄기-잎 연결(잎에 잎자루 포함돼 보이면 false)

// GLB 정규화: 중심 x/z, 밑면 y=0, 높이 1.0. forceLongY면 가장 긴 축을 Y로 회전.
// 반환 outer(단위,항등) → clone 후 scale/quaternion/position로 배치.
// 밑동 밴드(최저 y 근처) 정점들의 XZ 무게중심 = 잎자루 끝 위치
function anchorXZ(root, minY, band){
  const v=new THREE.Vector3(); let sx=0,sz=0,n=0;
  root.traverse(o=>{ if(o.isMesh&&o.geometry&&o.geometry.attributes.position){
    const p=o.geometry.attributes.position;
    for(let i=0;i<p.count;i++){ v.fromBufferAttribute(p,i).applyMatrix4(o.matrixWorld);
      if(v.y<=minY+band){ sx+=v.x; sz+=v.z; n++; } }
  }});
  return n?{x:sx/n, z:sz/n}:null;
}
function normalizeAsset(root, forceLongY, anchorBottom){
  root.updateMatrixWorld(true);
  let box=new THREE.Box3().setFromObject(root), size=new THREE.Vector3(); box.getSize(size);
  if(forceLongY){
    const mx=Math.max(size.x,size.y,size.z);
    if(mx===size.x) root.rotation.z=-Math.PI/2;
    else if(mx===size.z) root.rotation.x=Math.PI/2;
    root.updateMatrixWorld(true);
    box=new THREE.Box3().setFromObject(root); box.getSize(size);
  }
  const c=new THREE.Vector3(); box.getCenter(c);
  let ax=c.x, az=c.z;
  if(anchorBottom){ const a=anchorXZ(root, box.min.y, size.y*0.08); if(a){ ax=a.x; az=a.z; } }  // 잎: 자루끝 XZ에 정렬
  const inner=new THREE.Group(); inner.add(root); inner.position.set(-ax,-box.min.y,-az);
  const g=new THREE.Group(); g.add(inner); g.scale.setScalar(1/(size.y||1));
  const outer=new THREE.Group(); outer.add(g);
  outer.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; } });
  const nb=new THREE.Box3().setFromObject(outer), ns=new THREE.Vector3(); nb.getSize(ns);
  outer.userData={sx:ns.x, sy:ns.y, sz:ns.z};   // 단위 크기(sy≈1)
  return outer;
}
function loadAssets(cb){
  const loader=new THREE.GLTFLoader(), keys=Object.keys(ASSET_FILES); let n=0;
  const done=()=>{ if(++n===keys.length){ ASSETS_READY=true; cb&&cb(); } };
  keys.forEach(k=> loader.load('./assets/monstera/'+encodeURIComponent(ASSET_FILES[k]),
    g=>{ try{ ASSETS[k]=normalizeAsset(g.scene, !!LONGY[k], !!ANCHORB[k]); }catch(e){ console.warn('norm fail',k,e); } done(); },
    undefined, ()=>{ console.warn('load fail',k,ASSET_FILES[k]); done(); }));
}
// 에셋 인스턴스 = GLB 클론 + 에셋별 조정(스케일·회전·오프셋)을 안쪽에 베이크. 바깥은 placeAlong용.
function assetInst(key){
  const p=ASSETS[key]; if(!p) return null;
  const a=ADJ[key]||{};
  const inner=p.clone(true);
  inner.scale.multiplyScalar(a.scale||1);
  inner.rotation.set(a.rx||0, a.ry||0, a.rz||0);
  inner.position.set(a.ox||0, a.oy||0, a.oz||0);
  const w=new THREE.Group(); w.add(inner); w.userData=p.userData;
  return w;
}

function addPot(){
  const p=ASSETS.pot;
  if(p){ const g=p.clone(true); g.scale.setScalar(POT_H); plantGroup.add(g); SOIL_Y=POT_H*0.82; return; }
  // 임시 화분(폴백)
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.38,0.5,20), MAT.pot);
  pot.position.y=0.25; pot.castShadow=true; pot.receiveShadow=true; plantGroup.add(pot);
  const soil=new THREE.Mesh(new THREE.CylinderGeometry(0.47,0.47,0.06,20), MAT.soil);
  soil.position.y=0.47; soil.receiveShadow=true; plantGroup.add(soil);
  SOIL_Y=0.48;
}

function stemKey(radius){ return radius>0.085?'stem_thick' : radius>0.062?'stem_main' : radius>0.046?'stem_med' : 'stem_thin'; }
// GLB(밑면 y=0·긴축 Y)를 p0→p1 사이로 늘여 배치. 굵기 radius, color로 통일 틴트. → 두 점을 물리 연결.
function stretchGLB(key, p0, p1, radius, color, flatAz){
  const proto=ASSETS[key]; if(!proto) return false;
  const dir=new THREE.Vector3().subVectors(p1,p0), len=dir.length(); if(len<1e-5) return true;
  const a=ADJ[key]||{}; radius*=(a.scale||1);            // 에셋별 굵기 배율(B)
  const g=proto.clone(true);
  const hx=(proto.userData.sx||0.2)/2, hz=(proto.userData.sz||0.2)/2;
  const up=dir.clone().normalize();
  let sxw=radius/hx, szw=radius/hz;
  if(flatAz!=null && P.stemFlat>1.001){
    // 굵을수록 잎 방향(수평)으로 납작하게 → 넓은 면이 잎을 받쳐 자연스럽게 연결
    const flat=1+(P.stemFlat-1)*Math.max(0,Math.min(1,(radius-0.04)/0.06));
    const ld=new THREE.Vector3(Math.sin(flatAz),0,Math.cos(flatAz));
    let x=ld.clone().addScaledVector(up,-ld.dot(up)); if(x.lengthSq()<1e-4) x.set(1,0,0); x.normalize();
    const z=new THREE.Vector3().crossVectors(x,up).normalize();
    g.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(x,up,z));
    g.scale.set(sxw*flat, len, szw/flat);
  } else {
    g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), up);
    g.scale.set(sxw, len, szw);
  }
  g.position.copy(p0); if(color) tintObj(g,color); plantGroup.add(g); return true;
}
function addStemSeg(p0, p1, radius, woodT, flatAz){
  if(stretchGLB(stemKey(radius), p0, p1, radius, stemTint(woodT), flatAz)) return;
  // 폴백: 원기둥
  const dir=new THREE.Vector3().subVectors(p1,p0), len=dir.length(); if(len<1e-5) return;
  const geo=new THREE.CylinderGeometry(radius*0.85, radius*1.12, len, 7);
  const col=stemTint(woodT);
  const m=new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:col, roughness:0.75}));
  m.position.copy(p0).addScaledVector(dir,0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  m.castShadow=true; plantGroup.add(m);
}
// 잎자루(연결 줄기): 마디에서 잎 부착점까지 실제로 이어줌(길게) + 잎 속으로 넉넉히 파고듦 → 안 뜸.
function addPetiole(nodePos, d, size, maturity, leafBase){
  if(!(USE_PETIOLE && ASSETS.petiole)) return;
  const embed=0.05*size, over=0.20*size;                 // 마디에 조금, 잎 안쪽으로 넉넉히(겹침↑ → 안 뜸)
  const p0=nodePos.clone().addScaledVector(d,-embed);
  const p1=leafBase.clone().addScaledVector(d, over);
  stretchGLB('petiole', p0, p1, (0.022+0.015*maturity), stemTint(0.06));
}
// 성장 후보 마디 중 하나 선택: 거의 균등 랜덤 + 빛 받는 쪽 약간↑ (굴광성)
function pickCandidate(list, ld){
  let tot=0; const w=[];
  for(const n of list){ const proj=n.pos.x*ld.x+n.pos.z*ld.z; const al=Math.max(0,Math.min(1.5,proj));
    const ww=1+PHOTO*0.5*al; w.push(ww); tot+=ww; }
  let r=rng()*tot;
  for(let i=0;i<list.length;i++){ r-=w[i]; if(r<=0) return list[i]; }
  return list[list.length-1];
}
// 성숙도/새순 종류 → GLB 키 (mid·opening은 랜덤 2종=개체 다양성)
function leafKindKey(kind){
  if(kind==='mid')     return rng()<0.5?'leaf_mid1':'leaf_mid2';
  if(kind==='opening') return rng()<0.5?'bud_opening':'bud_opening2';
  if(kind==='young')   return 'leaf_young';
  if(kind==='mature')  return 'leaf_mature';
  if(kind==='furled')  return 'bud_furled';
  return 'leaf_young';
}
// obj(높이1·밑면0·긴축Y)를 base에서 dir 방향으로 세워 놓기(높이=worldLen)
function placeAlong(obj, base, dir, worldLen){
  obj.scale.setScalar(worldLen);
  obj.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  obj.position.copy(base);
}
// ===== 개체 통일 색 (시드로 고정 → 나중에 나는 잎도 같은 색으로 통일) =====
let PLANT_HUE=0.30, PLANT_SAT=0.55;
function seedColor(){ const cs=mulberry32((SEED*40503+12345)>>>0);
  PLANT_HUE=P.hueBase+cs()*P.hueRange;                                   // 개체 색조(연두~초록~진초록)
  PLANT_SAT=Math.max(0.15,Math.min(1, P.leafSat+(cs()-0.5)*P.satRange)); // 개체 채도(찐한 정도도 랜덤)
}
function tintObj(obj, color){
  obj.traverse(o=>{ if(o.isMesh&&o.material){
    const ms=Array.isArray(o.material)?o.material:[o.material];
    const nm=ms.map(m=>{ const c=m.clone(); c.color=color.clone(); if('map' in c) c.map=null; if('vertexColors' in c) c.vertexColors=false; c.userData={cloned:true}; return c; });
    o.material=Array.isArray(o.material)?nm:nm[0];
  }});
}
function leafTint(maturity){ return new THREE.Color().setHSL(PLANT_HUE+0.03*(1-maturity), Math.min(1,PLANT_SAT+0.12*maturity), P.leafLight-maturity*P.leafDark); }  // 새잎=연한→성숙=진함
function budTint(){ return new THREE.Color().setHSL(PLANT_HUE+0.05, Math.min(1,PLANT_SAT+0.05), P.leafLight+0.08); }
function stemTint(woodT){ return new THREE.Color().setHSL(PLANT_HUE,PLANT_SAT*0.75,0.40).lerp(new THREE.Color().setHSL(0.09,0.45,0.30),(woodT||0)*0.65); }
// 잎 크기: 나이(age 0..1)에 따른 단계별 곡선. 각 전환 시점·시작크기를 P로 지정 → 작게 나서 커지다 형태 전환.
function leafSize(age){
  const pts=[[0,P.sizeYoung],[P.stageYoung,P.sizeMid],[P.stageMid,P.sizeMature],[1,P.sizeFull]];
  for(let i=0;i<pts.length-1;i++){ const a0=pts[i][0],s0=pts[i][1],a1=pts[i+1][0],s1=pts[i+1][1];
    if(age<=a1){ const t=(age-a0)/Math.max(1e-4,a1-a0); return s0+(s1-s0)*Math.max(0,Math.min(1,t)); } }
  return P.sizeFull;
}
// 나이(age)+에셋별 order범위(B) → 이 마디에 쓸 잎 GLB 키
function leafKeyForOrder(order, age, stemR){
  const inR=k=>{ const a=ADJ[k]||{}; return order>=(a.omin==null?0:a.omin) && order<=(a.omax==null?99:a.omax); };
  // ★ 성인(갈라진) 잎은 받침 줄기가 충분히 굵어졌을 때만(=thick). 그전엔 성인 나이여도 중간잎 유지.
  const matureOK = age>=P.stageMid && (stemR||0)>=P.matureStemR;
  const desired = matureOK?['leaf_mature'] : age>=P.stageYoung?['leaf_mid1','leaf_mid2'] : ['leaf_young'];
  let cands=desired.filter(inR);
  if(!cands.length){ const all=['leaf_mature','leaf_mid1','leaf_mid2','leaf_young'].filter(inR); cands=all.length?all:desired; }
  return cands[Math.floor(rng()*cands.length)];
}
// 잎: 마디에서 방위 az + 성숙도별 처짐 방향으로. key=쓸 GLB. 잎자루 끝이 마디에 살짝 파고들게.
function addLeaf(nodePos, az, maturity, key){
  const size=leafSize(maturity);                                // ★ 단계별 곡선(작게 나서 커지다 형태 전환)
  const elev=P.leafElev - maturity*P.elevDrop;                  // 위로 받쳐지게(처짐 완화)
  const d=new THREE.Vector3(Math.cos(elev)*Math.sin(az), Math.sin(elev), Math.cos(elev)*Math.cos(az)).normalize();
  const reach=(0.03 + 0.05*size)*P.petioleLen;                  // 잎자루 길이(잎↔마디 거리)
  const base=nodePos.clone().addScaledVector(d, reach);
  addPetiole(nodePos, d, size, maturity, base);        // 연결 줄기가 마디~잎을 실제로 이어줌
  const proto=assetInst(key);
  if(proto){ placeAlong(proto, base, d, size); tintObj(proto, leafTint(maturity)); plantGroup.add(proto); return; }
  // 폴백: 임시 원뿔
  const type=/mature/.test(key)?2:/mid/.test(key)?1:0;
  const m=makeLeaf(type), pivot=new THREE.Group(); pivot.position.copy(base); pivot.rotation.y=az;
  m.rotation.x=0.5+maturity*0.7; m.scale.setScalar(size); pivot.add(m); plantGroup.add(pivot);
}
// 새순: 갓 난 성장점(거의 위로). furled → opening → (young 잎)
function addBud(nodePos, az, kind, size){
  const d=new THREE.Vector3(Math.sin(az)*0.16, 0.985, Math.cos(az)*0.16).normalize();   // 거의 곧게 위(송곳처럼)
  const proto=assetInst(leafKindKey(kind));
  const embed = kind==='furled'? 0.24*size : 0.12*size;   // 말린 새순은 줄기에 깊이 박히게(안 뜨고 자연스럽게 올라옴)
  if(proto){ placeAlong(proto, nodePos.clone().addScaledVector(d,-embed), d, size); tintObj(proto, budTint()); plantGroup.add(proto); return; }
  const m=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.14,8), MAT.stem); m.position.copy(nodePos); m.position.y+=size*0.5; plantGroup.add(m);
}

function clearGroup(g){ while(g.children.length){ const c=g.children[0]; g.remove(c); c.traverse&&c.traverse(o=>{ if(o.isMesh){ if(o.geometry) o.geometry.dispose();
  const ms=Array.isArray(o.material)?o.material:[o.material]; ms.forEach(m=>{ if(m&&m.userData&&m.userData.cloned) m.dispose(); }); } }); } }

function buildPlant(){
  rng=mulberry32(SEED);            // 매 빌드 동일 시드 → 안정적(슬라이더 드래그해도 안 흔들림)
  seedColor();                     // 개체 통일 색(시드 고정: 색조+채도)
  clearGroup(plantGroup);
  addPot();
  const g=GROWTH, gf=g/100;
  let stage='', nodes=0, leaves=0;

  if(g<P.seedEnd){
    const t=g/Math.max(1,P.seedEnd);
    const seed=new THREE.Mesh(new THREE.SphereGeometry(0.05+0.04*t,10,8), MAT.seed);
    seed.position.set(0,SOIL_Y+0.03,0); seed.scale.y=0.7; seed.castShadow=true; plantGroup.add(seed);
    stage='씨앗 🌰';
  } else if(g<P.sproutEnd){
    // 새싹: 자그만 줄기가 먼저 나오고, 그 끝에 말린 송곳잎(furled bud)
    const t=(g-P.seedEnd)/Math.max(1,P.sproutEnd-P.seedEnd);   // 0..1
    const h=0.05+0.18*t, top=new THREE.Vector3(0,SOIL_Y+h,0);
    addStemSeg(new THREE.Vector3(0,SOIL_Y,0), top, 0.028, 0);  // 얇은 줄기(stem_thin)
    addBud(top, rng()*Math.PI*2, t<0.6?'furled':'opening', P.budSize*(0.55+0.7*t));  // 말림→반쯤 펴짐
    stage='새싹 🌱';
  } else {
    const nTotal=Math.min(P.maxLeaves, 1+Math.floor((g-P.sproutEnd)/P.spawnStep));
    const L=LIGHT_AZ, ld=new THREE.Vector3(Math.sin(L),0,Math.cos(L));   // 빛 방향(수평)
    // ★ 중심 줄기(척추): 화분에서 위로 마디를 이어 쌓아 몸통을 만들고, 각 마디에서 잎이 남.
    //    대부분 트렁크를 연장(세로) → 몸통이 보임. 가끔 가지(branch)로 개체성.
    const base={pos:new THREE.Vector3(0,SOIL_Y,0), parent:null, order:0, laz:0};
    const nodes2=[base];
    const tips=[{node:base, dir:new THREE.Vector3((rng()-0.5)*0.2, 1, (rng()-0.5)*0.2).normalize(), trunk:true}];
    for(let k=1;k<=nTotal;k++){
      let ti=0;                                    // 기본: 중심 줄기 연장
      if(tips.length>1 && rng()<0.35) ti=1+Math.floor(rng()*(tips.length-1));
      const tip=tips[ti], trunk=tip.trunk;
      const upB=trunk?0.95:0.62, spread=trunk?P.spread:P.branchSpread;   // 트렁크는 곧추, 가지는 벌어짐
      const nd=new THREE.Vector3(
        tip.dir.x*0.55 + (rng()-0.5)*spread + ld.x*PHOTO*0.3,
        upB + rng()*0.08,
        tip.dir.z*0.55 + (rng()-0.5)*spread + ld.z*PHOTO*0.3
      ).normalize();
      const inLen=(trunk?P.internode:P.internode*0.83)*(0.75+0.4*gf);
      const np=tip.node.pos.clone().addScaledVector(nd, inLen);
      const jit=(rng()-0.5)*0.7;
      const node={pos:np, parent:tip.node, order:k, laz:k*GOLDEN+jit};   // 잎 방위=척추 둘레 나선
      nodes2.push(node); tip.node=node; tip.dir=nd;
      if(k>=3 && tips.length<3 && rng()<P.branchProb)      // 가끔 새 가지
        tips.push({node:node, dir:new THREE.Vector3((rng()-0.5)*1.2, 0.75, (rng()-0.5)*1.2).normalize(), trunk:false});
    }
    // 서브트리 크기(이 마디 위로 달린 잎 수) → 줄기 굵기 (base=제일 굵음)
    const kids={}; nodes2.forEach(n=>kids[n.order]=[]);
    nodes2.forEach(n=>{ if(n.parent) kids[n.parent.order].push(n); });
    const sub={};
    for(let i=nodes2.length-1;i>=0;i--){ const n=nodes2[i]; let s=1; kids[n.order].forEach(c=>s+=sub[c.order]); sub[n.order]=s; }
    // 그리기: 척추(부모→자식 줄기) + 각 마디에서 잎
    for(const n of nodes2){
      if(!n.parent) continue;
      const st=sub[n.order];
      // ★ 줄기 굵기=나이순: 갓 난 줄기 가늘게(thin) → 오래될수록·아래일수록 med→main.
      //   완전 굵은 thick은 큰 개체의 맨 아래 + 아주 오래된 마디에서만.
      const gB=P.sproutEnd+(n.order-1)*P.spawnStep;
      const segAge=Math.max(0, Math.min(1, (g-gB)/P.thickSpan));   // 줄기가 굵어지는 시간(느리게)
      const r=(0.026+P.thickScale*Math.sqrt(Math.max(0,st-1)))*(0.5+0.5*segAge);
      const azf=n.laz + PHOTO*0.5*Math.atan2(Math.sin(L-n.laz),Math.cos(L-n.laz));  // 잎 방위 + 빛쪽 당김
      addStemSeg(n.parent.pos, n.pos, r, Math.min(1, segAge*(st-1)/8), azf);  // 잎 방향으로 납작
      // ★ 각 잎의 개별 생장 나이(0=갓 남, 1=다 큼) → 작게 나서 서서히 커짐/성숙
      const gBirth=P.sproutEnd+(n.order-1)*P.spawnStep;
      const age=Math.max(0, Math.min(1, (g-gBirth)/P.matSpan));
      if(n.order===nTotal && nTotal>1 && age<P.budSpan){
        // 맨 새 마디 = 새순: 말림(furled)→펴짐(opening), 작게 나서 커짐
        if(age<P.budSpan*P.furlFrac) addBud(n.pos, azf, 'furled',  P.budSize*(0.7+age));
        else                         addBud(n.pos, azf, 'opening', P.budSize*(1.0+age*1.3));
      } else {
        addLeaf(n.pos, azf, age, leafKeyForOrder(n.order, age, r));   // 나이+order범위(B)+줄기굵기(성인잎 게이트)
      }
    }
    nodes=nTotal; leaves=nTotal; stage='척추 마디 '+nTotal+'개';
  }
  const el=document.getElementById('stat');
  el.innerHTML=`<span class="k">단계</span> ${stage}<br><span class="k">마디</span> ${nodes} · <span class="k">잎</span> ${leaves} · <span class="k">시드</span> ${SEED}`;
}

// ===== 씬/카메라 (loader_glb.html 직교 4방위 방식) =====
function init(){
  renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true});
  renderer.setPixelRatio(DPR);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;

  scene=new THREE.Scene(); scene.background=new THREE.Color(0x1a1526);
  cam=new THREE.OrthographicCamera(-1,1,1,-1,0.01,1000);

  scene.add(new THREE.HemisphereLight(0xbcd0ff,0x30281f,0.75));
  const dir=new THREE.DirectionalLight(0xfff2dc,1.4);
  dir.position.set(5,11,6); dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048); dir.shadow.bias=-0.0004; dir.shadow.radius=5;
  const ds=8; dir.shadow.camera.near=0.5; dir.shadow.camera.far=40;
  dir.shadow.camera.left=-ds; dir.shadow.camera.right=ds; dir.shadow.camera.top=ds; dir.shadow.camera.bottom=-ds;
  scene.add(dir, dir.target);
  scene.add(new THREE.DirectionalLight(0x88aaff,0.3).translateX(-6));

  ground=new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.ShadowMaterial({opacity:0.28}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
  grid=new THREE.GridHelper(12,12,0x555070,0x33304a);
  grid.material.transparent=true; grid.material.opacity=0.5; scene.add(grid);

  plantGroup=new THREE.Group(); scene.add(plantGroup);

  // 빛 방향 마커(작은 해)
  sunMarker=new THREE.Mesh(new THREE.SphereGeometry(0.14,14,12),
    new THREE.MeshBasicMaterial({color:0xffd24a}));
  scene.add(sunMarker); updateSun();

  // 몬스테라 GLB 에셋 로드 → 준비되면 재빌드(그 전엔 임시 도형 폴백)
  loadAssets(()=>{ buildPlant(); const s=document.getElementById('assetSel'); if(s) showPreview(s.value); });

  bindControls(); initPreview(); resize(); buildPlant(); animate();
}
function resize(){
  W=innerWidth; H=innerHeight; renderer.setSize(W,H);
  const a=W/H; cam.left=-FRUSTUM*a; cam.right=FRUSTUM*a; cam.top=FRUSTUM; cam.bottom=-FRUSTUM; cam.updateProjectionMatrix();
}
function updateCam(){
  const {az,el,r,tx,ty,tz}=orbit, ce=Math.cos(el);
  cam.position.set(tx+r*ce*Math.sin(az), ty+r*Math.sin(el), tz+r*ce*Math.cos(az));
  cam.up.set(0,1,0); cam.lookAt(tx,ty,tz); cam.zoom=orbit.zoom; cam.updateProjectionMatrix();
}
function snapView(dir){
  const flat=0.32;
  if(dir==='front'){ orbit.az=0; orbit.el=flat; }
  else if(dir==='left'){ orbit.az=-Math.PI/2; orbit.el=flat; }
  else if(dir==='right'){ orbit.az=Math.PI/2; orbit.el=flat; }
  else if(dir==='top'){ orbit.az=Math.PI*0.22; orbit.el=1.45; }
  updateCam();
}
function bindControls(){
  addEventListener('resize',()=>{ resize(); updateCam(); });
  let drag=false,px=0,py=0,pan=false;
  cv.addEventListener('pointerdown',e=>{ drag=true; pan=(e.button===2||e.shiftKey); px=e.clientX; py=e.clientY; cv.setPointerCapture(e.pointerId); });
  cv.addEventListener('pointermove',e=>{ if(!drag)return; const dx=e.clientX-px,dy=e.clientY-py; px=e.clientX; py=e.clientY;
    if(pan){ const sx=(cam.right-cam.left)/W/orbit.zoom, sy=(cam.top-cam.bottom)/H/orbit.zoom;
      const fwd=new THREE.Vector3(); cam.getWorldDirection(fwd);
      const right=new THREE.Vector3().crossVectors(fwd,cam.up).normalize();
      const up=new THREE.Vector3().crossVectors(right,fwd).normalize();
      const mx=-dx*sx,my=dy*sy;
      orbit.tx+=mx*right.x+my*up.x; orbit.ty+=mx*right.y+my*up.y; orbit.tz+=mx*right.z+my*up.z;
    } else { orbit.az+=dx*0.008; orbit.el=Math.max(0.05,Math.min(1.52,orbit.el+dy*0.006)); }
    updateCam(); });
  cv.addEventListener('pointerup',()=>drag=false);
  cv.addEventListener('contextmenu',e=>e.preventDefault());
  cv.addEventListener('wheel',e=>{ e.preventDefault(); orbit.zoom=Math.max(0.2,Math.min(8,orbit.zoom*(e.deltaY<0?1.1:0.9))); updateCam(); },{passive:false});

  document.querySelectorAll('.views [data-dir]').forEach(b=>b.onclick=()=>snapView(b.dataset.dir));
  document.getElementById('btnAuto').onclick=e=>{ autoRotate=!autoRotate; e.target.classList.toggle('on',autoRotate); };
  document.getElementById('btnGrid').onclick=e=>{ grid.visible=!grid.visible; e.target.classList.toggle('on',grid.visible); };

  const gs=document.getElementById('growth');
  gs.addEventListener('input',()=>{ GROWTH=+gs.value; document.getElementById('growthV').textContent=GROWTH; buildPlant(); });
  document.getElementById('btnSeed').onclick=()=>{ SEED=Math.floor(Math.random()*99999); buildPlant(); };
  const ls=document.getElementById('light');
  ls.addEventListener('input',()=>{ LIGHT_AZ=(+ls.value)*Math.PI/180; document.getElementById('lightV').textContent=ls.value+'°'; updateSun(); buildPlant(); });
  const ps=document.getElementById('photo');
  ps.addEventListener('input',()=>{ PHOTO=(+ps.value)/100; document.getElementById('photoV').textContent=ps.value+'%'; buildPlant(); });
  buildGlobalPanel(); buildAssetSelect();
  // 패널 접기
  document.getElementById('panelToggle').onclick=e=>{ const bd=document.getElementById('panelBody'); const hid=bd.style.display==='none'; bd.style.display=hid?'block':'none'; e.target.textContent=hid?'▾':'▸'; };
  // 설정 복사 / 리셋 (전체 A + 에셋별 B)
  document.getElementById('btnCopy').onclick=()=>{ const j=JSON.stringify({P, ADJ},null,1); if(navigator.clipboard) navigator.clipboard.writeText(j); prompt('설정 JSON (전체+에셋별 — 복사해서 코드 기본값으로):', j); };
  document.getElementById('btnReset').onclick=()=>{ P=Object.assign({},DEF); ADJ=JSON.parse(JSON.stringify(DEF_ADJ)); buildGlobalPanel(); buildAssetSliders(document.getElementById('assetSel').value); buildPlant(); };
}
// ===== B 에셋별 조정 슬라이더 =====
const ADJ_FIELDS=[
  {k:'scale',t:'크기 배율',min:0.2,max:3,step:0.05},
  {k:'rx',t:'회전 X',min:-3.2,max:3.2,step:0.05},
  {k:'ry',t:'회전 Y',min:-3.2,max:3.2,step:0.05},
  {k:'rz',t:'회전 Z',min:-3.2,max:3.2,step:0.05},
  {k:'ox',t:'오프셋 X',min:-0.6,max:0.6,step:0.01},
  {k:'oy',t:'오프셋 Y(자루↔마디)',min:-0.6,max:0.6,step:0.01},
  {k:'oz',t:'오프셋 Z',min:-0.6,max:0.6,step:0.01},
];
const ADJ_FIELDS_LEAF=[{k:'omin',t:'사용 order 최소',min:0,max:12,step:1},{k:'omax',t:'사용 order 최대',min:0,max:99,step:1}];
function buildAssetSelect(){
  const sel=document.getElementById('assetSel'); if(!sel) return;
  sel.innerHTML=ADJ_KEYS.map(k=>`<option value="${k}">${k.replace(/_/g,' ')}</option>`).join('');
  sel.onchange=()=>{ buildAssetSliders(sel.value); showPreview(sel.value); };
  buildAssetSliders(sel.value); showPreview(sel.value);
}
// ===== 선택 에셋 3D 미리보기(원본 색 그대로, 회전) =====
let prevR, prevScene, prevCam, prevObj;
function initPreview(){
  const c=document.getElementById('assetPrev'); if(!c||typeof THREE==='undefined') return;
  prevR=new THREE.WebGLRenderer({canvas:c, antialias:true, alpha:true});
  prevR.setPixelRatio(Math.min(2,devicePixelRatio||1)); prevR.setSize(c.width,c.height,false);
  prevR.outputEncoding=THREE.sRGBEncoding;
  prevScene=new THREE.Scene();
  prevScene.add(new THREE.HemisphereLight(0xffffff,0x777777,1.05));
  const d=new THREE.DirectionalLight(0xffffff,1.0); d.position.set(3,5,4); prevScene.add(d);
  const asp=c.width/c.height, F=0.6;
  prevCam=new THREE.OrthographicCamera(-F*asp,F*asp,F,-F,0.01,100);
  prevCam.position.set(1.3,0.85,1.9); prevCam.lookAt(0,0.4,0);
}
function showPreview(key){
  if(!prevScene) return;
  if(prevObj){ prevScene.remove(prevObj); prevObj=null; }
  const p=ASSETS[key]; if(!p) return;
  prevObj=p.clone(true);                                  // 원본 재질(구분용)
  const u=p.userData||{}, md=Math.max(u.sx||1,u.sy||1,u.sz||1)||1;
  prevObj.scale.setScalar(1/md);
  prevScene.add(prevObj);
}
function buildAssetSliders(key){
  const box=document.getElementById('assetSliders'); if(!box) return; box.innerHTML='';
  const a=ADJ[key]; let fields=ADJ_FIELDS.slice();
  if(/^leaf_/.test(key)) fields=fields.concat(ADJ_FIELDS_LEAF);
  fields.forEach(it=>{
    const f=document.createElement('div'); f.className='field';
    const lab=document.createElement('label'); lab.innerHTML=`${it.t} <b>${fmtVal(a[it.k])}</b>`;
    const inp=document.createElement('input'); inp.type='range'; inp.min=it.min; inp.max=it.max; inp.step=it.step; inp.value=a[it.k];
    inp.addEventListener('input',()=>{ a[it.k]=+inp.value; lab.querySelector('b').textContent=fmtVal(a[it.k]); buildPlant(); });
    f.appendChild(lab); f.appendChild(inp); box.appendChild(f);
  });
}
