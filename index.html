<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>볕 · 빛이 진짜인 방</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap');
  :root{
    --cream:#fbf6ec; --ink:#4a4038; --sun:#ffcf6b; --card:#fffdf8;
    --shadow:rgba(74,64,56,.16); --leaf:#7cae7a; --pot:#c98a5e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:'Gaegu',sans-serif;color:var(--ink);
    background:var(--cream);user-select:none;touch-action:none}
  #stage{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column}
  #sky{position:absolute;inset:0;transition:background 1s ease;z-index:0}
  .topbar{position:relative;z-index:5;display:flex;align-items:center;gap:10px;
    padding:14px 16px 2px calc(env(safe-area-inset-left,0)+16px)}
  .brand{font-family:'Jua';font-size:22px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.12);letter-spacing:1px}
  .brand .dot{color:var(--sun)}
  .time-label{margin-left:auto;background:rgba(255,255,255,.85);border-radius:14px;
    padding:4px 12px;font-family:'Jua';font-size:14px;box-shadow:0 3px 0 var(--shadow)}
  .sunbar{position:relative;z-index:5;display:flex;align-items:center;gap:10px;padding:6px 18px 0}
  .sunbar .ico{font-size:16px}
  input[type=range].sun{-webkit-appearance:none;flex:1;height:8px;border-radius:6px;outline:none;
    background:linear-gradient(90deg,#3a4a6b,#f7c9a8 22%,#bfe4f5 50%,#e9a6b0 78%,#2f3a5c)}
  input[type=range].sun::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff6dc,#ffcf6b);cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.25),0 0 0 3px rgba(255,255,255,.7)}
  #view{position:relative;flex:1;z-index:2;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #board{position:relative;width:min(94vw,460px);aspect-ratio:1/1}
  #boardCanvas{position:absolute;inset:0;width:100%;height:100%}
  /* 회전/뷰 컨트롤 */
  .viewctl{position:absolute;z-index:6;left:12px;bottom:8px;display:flex;flex-direction:column;gap:8px}
  .rbtns{display:flex;gap:8px}
  .cbtn{width:44px;height:44px;border-radius:14px;border:none;background:rgba(255,255,255,.9);
    box-shadow:0 3px 0 var(--shadow);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
    font-family:'Jua';color:var(--ink)}
  .cbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow)}
  .cbtn small{font-size:10px}
  .gear{position:absolute;z-index:6;right:14px;top:96px;width:40px;height:40px;border-radius:50%;
    background:rgba(255,255,255,.85);border:none;box-shadow:0 3px 0 var(--shadow);cursor:pointer;font-size:20px}
  .panel{position:absolute;z-index:20;right:12px;top:140px;width:216px;background:var(--card);
    border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:14px;transform:scale(.9);opacity:0;
    pointer-events:none;transition:.18s;transform-origin:top right}
  .panel.open{opacity:1;transform:scale(1);pointer-events:auto}
  .panel h4{font-family:'Jua';font-size:14px;margin-bottom:2px}
  .panel .sub{font-size:12px;color:#9a8d80;margin-bottom:10px;font-weight:700}
  .prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;font-weight:700}
  .lux{font-family:'Jua';color:var(--pot)}
  .chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#f0e9dd;font-weight:700}
  .chip.good{background:#d9efd6;color:#4f8b52}
  .toggle{width:42px;height:24px;border-radius:12px;background:#ddd4c6;position:relative;cursor:pointer;transition:.2s}
  .toggle.on{background:var(--leaf)}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{left:21px}
  .mini{font-size:11px;color:#9a8d80;font-weight:700;line-height:1.4;margin-top:4px}
  .heatbtn{font-size:11px;font-family:'Jua';border:none;background:#f0e9dd;border-radius:10px;padding:4px 8px;cursor:pointer;color:var(--ink)}
  .heatbtn.on{background:var(--sun)}
  .dock{position:relative;z-index:5;display:flex;gap:8px;padding:10px 12px calc(env(safe-area-inset-bottom,0)+12px);
    overflow-x:auto;background:linear-gradient(to top,rgba(255,253,248,.96),rgba(255,253,248,.6))}
  .dock::-webkit-scrollbar{display:none}
  .tray-btn{flex:0 0 auto;width:58px;height:60px;border-radius:18px;border:none;background:var(--card);
    box-shadow:0 4px 0 var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer}
  .tray-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow)}
  .tray-btn div{font-size:24px}.tray-btn span{font-size:10px;font-family:'Jua';color:#8a7d70}
  .hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:8;background:rgba(74,64,56,.9);
    color:#fff;font-weight:700;font-size:14px;padding:7px 15px;border-radius:16px;pointer-events:none;opacity:0;transition:.4s}
  .hint.show{opacity:1}
</style>
</head>
<body>
<div id="stage">
  <div id="sky"></div>
  <div class="topbar">
    <span class="brand">볕<span class="dot">.</span></span>
    <span class="time-label" id="timeLabel">한낮</span>
  </div>
  <div class="sunbar">
    <span class="ico">🌙</span>
    <input type="range" min="0" max="100" value="50" class="sun" id="sunSlider">
    <span class="ico">🌙</span>
  </div>

  <button class="gear" id="gearBtn">⚙️</button>
  <div class="panel" id="panel">
    <h4>빛 상세설정</h4>
    <div class="sub">진짜 조도로 계산해요 (lx)</div>
    <div class="prow"><span>창가 평균</span><span class="lux" id="pWindow">— lx</span></div>
    <div class="prow"><span>방 안쪽</span><span class="lux" id="pInner">— lx</span></div>
    <div class="prow"><span>가장 밝은 곳</span><span class="lux" id="pMax">— lx</span></div>
    <div class="prow"><span>식물 컨디션</span><span class="chip" id="pPlant">—</span></div>
    <div class="prow"><span>천장 조명</span><div class="toggle" id="tLamp"></div></div>
    <div class="prow"><span>조도 히트맵 보기</span><button class="heatbtn" id="bHeat">OFF</button></div>
    <div class="mini">창문·조명·식물이 모두 데이터로 정의돼요. 빛 잘 드는 곳에 식물을 두면 자라요 🌱</div>
  </div>

  <div class="hint" id="hint"></div>

  <div id="view">
    <div id="board">
      <canvas id="boardCanvas"></canvas>
    </div>
    <div class="viewctl">
      <div class="rbtns">
        <button class="cbtn" id="rotL">↺</button>
        <button class="cbtn" id="rotR">↻</button>
      </div>
      <button class="cbtn" id="pitchBtn"><small>시점</small></button>
    </div>
  </div>

  <div class="dock" id="dock"></div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
