<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>볕 · 창틀 샘플 벽 (3D)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#e9e3d8;font-family:'Gaegu',sans-serif;color:#2e2e38}
  #c{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
  header{position:relative;z-index:2;padding:18px 24px 4px}
  header h1{font-family:'Jua';font-size:23px}
  header h1 b{color:#e08a2c}
  header .sub{font-weight:700;font-size:13px;color:#6a6f7a;margin-top:2px}
  .rows{position:relative;z-index:2;padding:6px 20px 60px}
  .wall{margin-bottom:4px}
  .view{width:100%;height:300px}
  .legend{font-weight:700;font-size:12px;color:#5a6069;padding:2px 4px 14px;line-height:1.7}
  .legend b{color:#2f9a55}
  .legend .draft{color:#546}
  #err{position:fixed;z-index:9;left:12px;bottom:12px;background:#c0392b;color:#fff;padding:8px 12px;border-radius:8px;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<header>
  <h1>볕<b>.</b> 창틀 샘플 벽 (3D) — 실제 크기 비율</h1>
  <div class="sub">한 벽에 쭈루룩 · 드래그로 회전 · ● = 확정</div>
</header>
<div class="rows" id="rows"></div>
<div id="err"></div>

<script type="module">
import { buildWindowFrame, glassMaterial } from '../../src/render3d/window_frame.js?v=w1';

const showErr=m=>{const e=document.getElementById('err');e.textContent=m;e.style.display='block';};
window.addEventListener('error',e=>showErr('오류: '+e.message));

const WALL_H=3.6, GAP=0.7, MARGIN=0.7, MAXW=15;   // meters
function realSize(P){
  if(P.shape==='circle')      return [1.15,1.15];
  if(P.pattern==='letterbox') return P.cols>=3?[2.6,0.82]:[1.8,0.78];
  if(P.pattern==='slim')      return [0.85,1.6];
  if(P.big)                   return P.pattern==='none'?[3.4,2.0]:(P.frameColor==='#6b7280'?[3.6,2.75]:[3.8,2.7]);
  if(P.pattern==='curtainwall')return [2.6,2.25];
  if(P.pattern==='none')      return [1.8,2.05];
  return [Math.min(2.5,0.95+P.cols*0.42), Math.min(2.35,0.95+P.rows*0.42)];
}
function sillH(P,h){
  if(P.shape==='circle')       return 1.65-h/2;
  if(P.pattern==='letterbox')  return WALL_H-h-0.25;
  if(P.big||P.pattern==='none'||P.pattern==='curtainwall') return 0.12;
  return 0.9;
}

// ---- 렌더러 (행마다 scissor) ----
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
renderer.setScissorTest(true);

const FRAME_FT=0.09;
function makeWindow(P){
  const grp=new THREE.Group();
  const [w,h]=realSize(P);
  // 개구부(하늘) — 벽 앞에 살짝 띄워 '창 구멍'처럼
  const inner=(P.shape==='circle')
    ? new THREE.CircleGeometry(Math.min(w,h)/2-FRAME_FT,40)
    : new THREE.PlaneGeometry(w-2*FRAME_FT,h-2*FRAME_FT);
  const sky=new THREE.Mesh(inner, new THREE.MeshBasicMaterial({color:0xbfe0f2}));
  sky.position.z=0.01; grp.add(sky);
  // 유리
  const gm=glassMaterial(P.glass);
  if(gm){ const glass=new THREE.Mesh(inner.clone(), gm.clone()); glass.position.z=0.05; grp.add(glass); }
  // 프레임(코드)
  const frame=buildWindowFrame(w,h,{...P}); grp.add(frame);
  grp.userData={w,h};
  return grp;
}

function buildRowScene(row){
  const scene=new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0xffffff,0x8a8172,0.7));
  const dir=new THREE.DirectionalLight(0xfff2dc,1.15);
  dir.position.set(3,6,6); dir.castShadow=true; dir.shadow.mapSize.set(1024,1024);
  dir.shadow.radius=5; dir.shadow.bias=-0.0004;
  const ds=12; dir.shadow.camera.left=-ds;dir.shadow.camera.right=ds;dir.shadow.camera.top=ds;dir.shadow.camera.bottom=-ds;dir.shadow.camera.far=40;
  scene.add(dir);
  const rowW=row[row.length-1].x + row[row.length-1].w + MARGIN;
  // 벽 + 바닥
  const wall=new THREE.Mesh(new THREE.BoxGeometry(rowW,WALL_H,0.2),
    new THREE.MeshStandardMaterial({color:0xefe7db, roughness:0.97}));
  wall.position.set(rowW/2, WALL_H/2, -0.1); wall.receiveShadow=true; scene.add(wall);
  const floor=new THREE.Mesh(new THREE.BoxGeometry(rowW+2,0.1,3),
    new THREE.MeshStandardMaterial({color:0xe4ddcf, roughness:1}));
  floor.position.set(rowW/2,-0.05,1.4); floor.receiveShadow=true; scene.add(floor);
  // 창들
  for(const it of row){
    const win=makeWindow(it.P);
    const sill=sillH(it.P,it.h);
    win.position.set(it.x+it.w/2, sill+it.h/2, 0);
    win.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; } });
    scene.add(win);
  }
  // 카메라: 약간 3/4 각도로 벽 전체 프레이밍
  const cam=new THREE.PerspectiveCamera(32,3,0.1,200);
  cam.userData={rowW};
  return {scene,cam,rowW};
}

(async ()=>{
  let data;
  try{ data=await fetch('../../data/window_presets.json').then(r=>r.json()); }
  catch(e){ showErr('window_presets.json 로드 실패: '+e.message); return; }
  const P=data.presets||data;
  const items=Object.keys(P).map(id=>{ const [w,h]=realSize(P[id]); return {id,P:P[id],w,h}; });
  // 행 나누기
  const rows=[]; let cur=[], x=MARGIN;
  for(const it of items){ if(x+it.w+GAP>MAXW && cur.length){ rows.push(cur); cur=[]; x=MARGIN; } it.x=x; cur.push(it); x+=it.w+GAP; }
  if(cur.length) rows.push(cur);

  const host=document.getElementById('rows');
  const built=[];
  for(const row of rows){
    const div=document.createElement('div'); div.className='wall';
    const view=document.createElement('div'); view.className='view'; div.appendChild(view);
    const leg=document.createElement('div'); leg.className='legend';
    leg.innerHTML=row.map(it=>{ const c=it.P.status==='확정'; const n=it.id.replace('win_',''); return c?`<b>● ${n}</b>`:`<span class="draft">${n}</span>`; }).join('  ·  ');
    div.appendChild(leg); host.appendChild(div);
    built.push({view, ...buildRowScene(row)});
  }

  let az=0, drag=false, px=0;
  canvas.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;});
  addEventListener('pointermove',e=>{ if(drag){ az+=(e.clientX-px)*0.006; az=Math.max(-0.5,Math.min(0.5,az)); px=e.clientX; }});
  addEventListener('pointerup',()=>drag=false);
  function resize(){ renderer.setSize(innerWidth,innerHeight,false); }
  addEventListener('resize',resize); resize();

  function render(){
    requestAnimationFrame(render);
    const ch=canvas.clientHeight;
    for(const b of built){
      const r=b.view.getBoundingClientRect();
      if(r.bottom<0||r.top>ch) continue;
      const w=r.width, h=r.height, l=r.left, bot=ch-r.bottom;
      renderer.setViewport(l,bot,w,h); renderer.setScissor(l,bot,w,h);
      const cam=b.cam, W=b.rowW; cam.aspect=w/h; cam.updateProjectionMatrix();
      // 벽을 화면에 담기: 거리 = 폭 기반
      const dist=W*0.62+2.2, ang=0.28+az;
      cam.position.set(W/2+Math.sin(ang)*dist*0.5, 1.75, Math.cos(ang)*dist);
      cam.lookAt(W/2, 1.55, 0);
      renderer.render(b.scene, cam);
    }
  }
  render();
  document.title=`볕 · 창틀 샘플 벽 3D (${items.length})`;
})();
</script>
</body>
</html>
