<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>볕 · 창틀 프리셋 도면 시트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#eef0f3;font-family:'Gaegu',sans-serif;color:#2e2e38}
  header{padding:20px 24px 8px}
  header h1{font-family:'Jua';font-size:24px}
  header h1 b{color:#e08a2c}
  header .sub{font-weight:700;font-size:13px;color:#6a6f7a;margin-top:3px}
  .legend{margin-top:8px;font-size:12.5px;color:#5a6069;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:5px}
  .chip i{width:16px;height:12px;border-radius:2px;display:inline-block;border:1px solid #b9c0c9}
  .grid{display:grid;gap:16px;padding:14px 24px 60px;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .cell{background:#fff;border-radius:14px;border:1px solid #dfe3e8;overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .cell.review{border:2px solid #e0a35c}
  .draw{background:#e5e8ec}
  .draw svg{display:block;width:100%;height:auto}
  .meta{padding:10px 13px 12px}
  .meta .id{font-family:'Jua';font-size:15px;display:flex;align-items:center;gap:8px}
  .sw{width:15px;height:15px;border-radius:4px;border:1px solid rgba(0,0,0,.2);flex:none}
  .status{margin-left:auto;font-size:11px;font-weight:700}
  .status.ok{color:#2f9a55} .status.draft{color:#c8722a}
  .meta .room{font-weight:700;font-size:12.5px;color:#5a6069;margin-top:3px}
  .tag{display:inline-block;background:#eef1f4;border-radius:6px;padding:1.5px 8px;margin:3px 4px 0 0;font-size:11.5px;color:#4a5058}
  .tag.g{background:#e0efe6;color:#2f6d48}
  .meta .lit{font-size:11.5px;color:#7a8088;margin-top:4px}
  #err{position:fixed;left:12px;bottom:12px;background:#c0392b;color:#fff;padding:8px 12px;border-radius:8px;display:none}
</style>
</head>
<body>
<header>
  <h1>볕<b>.</b> 창틀 프리셋 도면 시트</h1>
  <div class="sub">정면 도면(2D 벡터) · 선명 비교 · 낙점용</div>
  <div class="legend">
    <span class="chip"><i style="background:#e9f3f8"></i>clear 맑은유리</span>
    <span class="chip"><i style="background:#dfe6ea"></i>frosted 간유리</span>
    <span class="chip"><i style="background:#d9e6ee;background-image:linear-gradient(#c2d2dd 1px,transparent 0),linear-gradient(90deg,#c2d2dd 1px,transparent 0);background-size:6px 6px"></i>glassblock</span>
    <span class="chip"><i style="background:#cfe6d8"></i>green-tint</span>
    <span class="chip"><i style="background:#fff;border-style:dashed;border-color:#b9a06a"></i>none 뚫림</span>
    <span style="color:#c8722a;font-weight:700">주황 테두리 = 초안(미낙점)</span>
  </div>
</header>
<div class="grid" id="grid"></div>
<div id="err"></div>

<script>
const showErr=m=>{const e=document.getElementById('err');e.textContent=m;e.style.display='block';};
window.addEventListener('error',e=>showErr('오류: '+e.message));

const AREA_W=300, AREA_H=210;
const GLASS_FILL={clear:'#e9f3f8','green-tint':'#cfe6d8',frosted:'#dfe6ea',glassblock:'#d9e6ee',none:null};
const STROKE='rgba(52,54,64,.42)';   // 모든 프레임 요소 얇은 외곽선 → 흰 프레임도 읽힘

// 정면 도면 비율(폭:높이)
function elevSize(P){
  if(P.shape==='circle')      return [1.4,1.4];
  if(P.pattern==='letterbox') return [2.6,0.9];
  if(P.pattern==='slim')      return [0.95,1.7];
  if(P.big)                   return P.pattern==='none'?[2.5,1.5]:[2.4,1.65];
  if(P.pattern==='curtainwall')return [2.0,1.55];
  if(P.pattern==='none')      return [1.5,1.7];
  return [1.0+(P.cols-1)*0.45, 1.1+(P.rows-1)*0.5];   // grid/cross: 분할 비율 반영
}
const R=(n)=> (Math.round(n*100)/100);
function bar(x,y,w,h,fc){ return `<rect x="${R(x)}" y="${R(y)}" width="${R(w)}" height="${R(h)}" fill="${fc}" stroke="${STROKE}" stroke-width="0.7"/>`; }

function buildSVG(P){
  const [uw,uh]=elevSize(P);
  const pad=22;
  const s=Math.min((AREA_W-2*pad)/uw,(AREA_H-2*pad)/uh);
  const W=uw*s, H=uh*s, ox=(AREA_W-W)/2, oy=(AREA_H-H)/2;
  const ft=Math.max(5,0.055*Math.min(W,H));
  let bt=Math.max(2.6,0.03*Math.min(W,H)); if(P.pattern==='curtainwall') bt*=1.7;
  const fc=P.frameColor, g=P.glass||{}, gf=GLASS_FILL[g.type];
  const p=[`<rect width="${AREA_W}" height="${AREA_H}" fill="#e5e8ec"/>`];

  if(P.shape==='circle'){
    const rad=Math.min(W,H)/2, cx=ox+W/2, cy=oy+H/2, ir=rad-ft;
    if(gf) p.push(`<circle cx="${R(cx)}" cy="${R(cy)}" r="${R(ir)}" fill="${gf}"/>`);
    if(P.pattern!=='none'){
      if(P.cols>1) p.push(bar(cx-bt/2, cy-ir, bt, 2*ir, fc));
      if(P.rows>1) p.push(bar(cx-ir, cy-bt/2, 2*ir, bt, fc));
    }
    p.push(`<circle cx="${R(cx)}" cy="${R(cy)}" r="${R(rad-ft/2)}" fill="none" stroke="${fc}" stroke-width="${R(ft)}"/>`);
    p.push(`<circle cx="${R(cx)}" cy="${R(cy)}" r="${R(rad)}" fill="none" stroke="${STROKE}" stroke-width="1"/>`);
    p.push(`<circle cx="${R(cx)}" cy="${R(cy)}" r="${R(ir)}" fill="none" stroke="${STROKE}" stroke-width="1"/>`);
    return `<svg viewBox="0 0 ${AREA_W} ${AREA_H}">${p.join('')}</svg>`;
  }

  const rx=P.corner==='round'?Math.min(W,H)*0.11:0;
  const ix=ox+ft, iy=oy+ft, iw=W-2*ft, ih=H-2*ft;
  // 유리
  if(gf){ p.push(`<rect x="${R(ix)}" y="${R(iy)}" width="${R(iw)}" height="${R(ih)}" rx="${R(Math.max(0,rx-ft))}" fill="${gf}"/>`); }
  else  { p.push(`<rect x="${R(ix)}" y="${R(iy)}" width="${R(iw)}" height="${R(ih)}" fill="none" stroke="#b9a06a" stroke-width="1.6" stroke-dasharray="6 4"/>`); }
  if(g.type==='glassblock'){
    for(let i=1;i<3;i++) p.push(`<line x1="${R(ix+iw*i/3)}" y1="${R(iy)}" x2="${R(ix+iw*i/3)}" y2="${R(iy+ih)}" stroke="#c2d2dd" stroke-width="2"/>`);
    for(let j=1;j<3;j++) p.push(`<line x1="${R(ix)}" y1="${R(iy+ih*j/3)}" x2="${R(ix+iw)}" y2="${R(iy+ih*j/3)}" stroke="#c2d2dd" stroke-width="2"/>`);
  }
  if(g.type==='frosted'){   // 대각 해치로 간유리 표현
    for(let d=-ih; d<iw; d+=9){
      const x1=ix+Math.max(0,d), y1=iy+Math.max(0,-d);
      const x2=ix+Math.min(iw,d+ih), y2=iy+Math.min(ih,(d+ih<=iw?ih:iw-d));
      p.push(`<line x1="${R(x1)}" y1="${R(y1)}" x2="${R(x2)}" y2="${R(y2)}" stroke="#cdd6dc" stroke-width="1.4"/>`);
    }
  }
  // 격자 살
  const addV=n=>{ for(let i=1;i<n;i++){ const x=ix+iw*i/n; p.push(bar(x-bt/2,iy,bt,ih,fc)); } };
  const addH=n=>{ for(let j=1;j<n;j++){ const y=iy+ih*j/n; p.push(bar(ix,y-bt/2,iw,bt,fc)); } };
  switch(P.pattern){
    case 'none': break;
    case 'letterbox': addV(P.cols); break;
    case 'slim': addH(P.rows); break;
    case 'cross': addV(2); addH(2); break;
    default: addV(P.cols); addH(P.rows);
  }
  // 외곽틀(칠한 테두리 + 얇은 외곽선)
  p.push(`<rect x="${R(ox+ft/2)}" y="${R(oy+ft/2)}" width="${R(W-ft)}" height="${R(H-ft)}" rx="${R(rx)}" fill="none" stroke="${fc}" stroke-width="${R(ft)}"/>`);
  p.push(`<rect x="${R(ox)}" y="${R(oy)}" width="${R(W)}" height="${R(H)}" rx="${R(rx)}" fill="none" stroke="${STROKE}" stroke-width="1"/>`);
  p.push(`<rect x="${R(ix)}" y="${R(iy)}" width="${R(iw)}" height="${R(ih)}" rx="${R(Math.max(0,rx-ft))}" fill="none" stroke="${STROKE}" stroke-width="1"/>`);
  // 창턱
  if(P.sill) p.push(`<rect x="${R(ox-ft*0.6)}" y="${R(oy+H)}" width="${R(W+ft*1.2)}" height="${R(ft*0.85)}" fill="${fc}" stroke="${STROKE}" stroke-width="0.8"/>`);
  return `<svg viewBox="0 0 ${AREA_W} ${AREA_H}">${p.join('')}</svg>`;
}

(async ()=>{
  let data;
  try{ data=await fetch('../../data/window_presets.json').then(r=>r.json()); }
  catch(e){ showErr('window_presets.json 로드 실패: '+e.message); return; }
  const P=data.presets||data, grid=document.getElementById('grid');
  for(const id of Object.keys(P)){
    const w=P[id], g=w.glass||{};
    const cell=document.createElement('div'); cell.className='cell'+(w.final?'':' review');
    cell.innerHTML=
      `<div class="draw">${buildSVG(w)}</div>`+
      `<div class="meta">`+
        `<div class="id"><span class="sw" style="background:${w.frameColor}"></span>${id}`+
          `<span class="status ${w.status==='확정'?'ok':'draft'}">${w.status||''}</span></div>`+
        `<div class="room">${w.room||''}${w.big?' · 대형':''}</div>`+
        `<div>${w.shape==='circle'?'<span class="tag">◯ 원형</span>':''}`+
          `<span class="tag">${w.pattern} ${w.cols}×${w.rows}</span>`+
          `<span class="tag g">${g.type}</span><span class="tag">${w.gloss}</span>`+
          `${w.corner==='round'?'<span class="tag">round</span>':''}${w.sill?'<span class="tag">sill</span>':''}</div>`+
        `<div class="lit">빛 ×${(w.light&&w.light.illumMul)??'-'}${(w.light&&w.light.diffuse)?' · 확산':''} · 투과 ${g.transmittance??'-'}</div>`+
      `</div>`;
    grid.appendChild(cell);
  }
  document.title=`볕 · 창틀 프리셋 도면 (${Object.keys(P).length})`;
})();
</script>
</body>
</html>
