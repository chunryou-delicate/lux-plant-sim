<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>볕 · 전체 에셋 갤러리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#f1ece3;font-family:'Gaegu',sans-serif;color:#2e2e38}
  header{padding:18px 22px 6px;position:sticky;top:0;z-index:10;background:linear-gradient(#f1ece3,#f1ece3ee);backdrop-filter:blur(4px)}
  h1{font-family:'Jua';font-size:24px}h1 b{color:#e08a2c}
  .sub{font-weight:700;font-size:13px;color:#6a6f7a;margin-top:2px}
  .links{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .links a{background:#fff;border:1px solid #e0dcd2;border-radius:11px;padding:6px 12px;font-family:'Jua';font-size:12.5px;color:#3d3548;text-decoration:none;box-shadow:0 2px 0 rgba(0,0,0,.06)}
  .links a:hover{background:#ffe9c9}.links a b{color:#e08a2c}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{background:#fff;border:1px solid #e0dcd2;border-radius:20px;padding:5px 14px;font-weight:700;font-size:12.5px;cursor:pointer}
  .tab.on{background:#3a3548;color:#fff;border-color:#3a3548}
  #q{flex:1;min-width:160px;background:#fff;border:1px solid #e0dcd2;border-radius:11px;padding:8px 12px;font-family:'Gaegu';font-weight:700;font-size:13px}
  #count{font-weight:700;font-size:12px;color:#7a808a}
  .grid{display:grid;gap:12px;padding:12px 22px 60px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .card{background:#fff;border-radius:12px;border:1px solid #e6e1d7;overflow:hidden;cursor:pointer;position:relative;transition:transform .1s}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
  .thumb{width:100%;aspect-ratio:1;background:#eee7db;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb.glb{background:linear-gradient(135deg,#dfe7ef,#eef2f6);color:#6a86a0;font-family:'Jua';font-size:13px;flex-direction:column;gap:4px}
  .thumb svg{width:100%;height:100%}
  .meta{padding:7px 9px 9px}
  .nm{font-weight:700;font-size:12px;line-height:1.25;color:#2e2e38;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:30px}
  .tags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
  .tg{font-size:10px;font-weight:700;background:#eef1f4;color:#5a6069;border-radius:5px;padding:1px 6px}
  .tg.glb{background:#dfeaf5;color:#3a6a90}.tg.st{background:#e0efe6;color:#2f7a4c}
  .badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:700;color:#fff;border-radius:6px;padding:2px 6px}
  .badge.glb{background:#4a86b8}.badge.win{background:#c8892f}.badge.char{background:#a05a8a}
  /* modal */
  #modal{position:fixed;inset:0;z-index:50;background:rgba(20,18,26,.82);display:none;align-items:center;justify-content:center}
  #modal.on{display:flex}
  #mbox{width:min(88vw,720px);height:min(80vh,620px);background:#20222a;border-radius:16px;overflow:hidden;position:relative}
  #mcv{width:100%;height:100%;display:block}
  #mclose{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:6px 12px;font-family:'Jua';cursor:pointer}
  #mlab{position:absolute;left:14px;bottom:12px;color:#fff;font-weight:700;font-size:13px;background:rgba(0,0,0,.4);padding:6px 12px;border-radius:10px}
  #err{position:fixed;left:12px;bottom:12px;background:#c0392b;color:#fff;padding:8px 12px;border-radius:8px;display:none;z-index:60}
</style>
</head>
<body>
<header>
  <h1>볕<b>.</b> 전체 에셋 갤러리</h1>
  <div class="sub">식물 · 캐릭터 · 창문 · 집 — 한곳에서 · GLB는 클릭하면 3D로</div>
  <div class="links" id="links"></div>
  <div class="bar">
    <div class="tabs" id="tabs"></div>
    <input id="q" placeholder="이름·종류 검색 (예: 몬스테라, 자취생, 아치)">
    <span id="count"></span>
  </div>
</header>
<div class="grid" id="grid"></div>

<div id="modal"><div id="mbox"><canvas id="mcv"></canvas><button id="mclose">닫기 ✕</button><div id="mlab"></div></div></div>
<div id="err"></div>

<script>
const showErr=m=>{const e=document.getElementById('err');e.textContent=m;e.style.display='block';};
window.addEventListener('error',e=>showErr('오류: '+e.message));
const links=[
  ['🏠 게임(방)','index.html'],['🪟 창틀 쇼룸','assets/house/_window_showroom.html'],
  ['🎨 컬러 쇼룸','assets/house/_color_showroom.html'],['📐 창 도면','assets/house/_window_sheet.html'],
  ['🌱 식물 성장','plant_grow.html'],['🧍 캐릭터 뷰어','assets/characters/char_8_viewer.html'],
  ['📦 GLB 로더','loader_glb.html'],['💡 조도툴','tool.html']
];
document.getElementById('links').innerHTML=links.map(([t,u])=>`<a href="${u}">${t}</a>`).join('');

// ---- 창문 프리셋 미니 SVG 썸네일 ----
function winSVG(P){
  const W=150,H=150,pad=20; let uw=1,uh=1;
  if(P.shape==='circle'){uw=uh=1;} else if(P.pattern==='letterbox'){uw=2.4;uh=0.9;}
  else if(P.pattern==='slim'){uw=0.9;uh=1.7;} else if(P.big||P.full){uw=2.2;uh=1.7;}
  else {uw=1+(P.cols-1)*0.4;uh=1.1+(P.rows-1)*0.45;}
  const s=Math.min((W-2*pad)/uw,(H-2*pad)/uh),w=uw*s,h=uh*s,ox=(W-w)/2,oy=(H-h)/2;
  const ft=Math.max(4,0.06*Math.min(w,h)),bt=Math.max(2,0.03*Math.min(w,h));
  const fc=P.frameColor,g=P.glass||{},gf={clear:'#e9f3f8','green-tint':'#cfe6d8',frosted:'#dfe6ea',glassblock:'#d9e6ee',none:null}[g.type];
  const st='rgba(52,54,64,.4)',p=[`<rect width="${W}" height="${H}" fill="#eef0f2"/>`];
  if(P.shape==='circle'){const R=Math.min(w,h)/2,cx=ox+w/2,cy=oy+h/2;
    if(gf)p.push(`<circle cx="${cx}" cy="${cy}" r="${R-ft}" fill="${gf}"/>`);
    if(P.cols>1)p.push(`<rect x="${cx-bt/2}" y="${cy-(R-ft)}" width="${bt}" height="${2*(R-ft)}" fill="${fc}"/>`);
    if(P.rows>1)p.push(`<rect x="${cx-(R-ft)}" y="${cy-bt/2}" width="${2*(R-ft)}" height="${bt}" fill="${fc}"/>`);
    p.push(`<circle cx="${cx}" cy="${cy}" r="${R-ft/2}" fill="none" stroke="${fc}" stroke-width="${ft}"/><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${st}" stroke-width="1"/>`);
    return `<svg viewBox="0 0 ${W} ${H}">${p.join('')}</svg>`;}
  const ix=ox+ft,iy=oy+ft,iw=w-2*ft,ih=h-2*ft;
  if(gf)p.push(`<rect x="${ix}" y="${iy}" width="${iw}" height="${ih}" fill="${gf}"/>`);
  else p.push(`<rect x="${ix}" y="${iy}" width="${iw}" height="${ih}" fill="none" stroke="#b9a06a" stroke-width="1.3" stroke-dasharray="5 3"/>`);
  const addV=n=>{for(let i=1;i<n;i++)p.push(`<rect x="${ix+iw*i/n-bt/2}" y="${iy}" width="${bt}" height="${ih}" fill="${fc}"/>`);};
  const addH=n=>{for(let j=1;j<n;j++)p.push(`<rect x="${ix}" y="${iy+ih*j/n-bt/2}" width="${iw}" height="${bt}" fill="${fc}"/>`);};
  if(P.pattern==='letterbox')addV(P.cols); else if(P.pattern==='slim')addH(P.rows);
  else if(P.pattern==='cross'){addV(2);addH(2);} else if(P.pattern!=='none'){addV(P.cols);addH(P.rows);}
  p.push(`<rect x="${ox+ft/2}" y="${oy+ft/2}" width="${w-ft}" height="${h-ft}" rx="${P.corner==='round'?Math.min(w,h)*0.1:0}" fill="none" stroke="${fc}" stroke-width="${ft}"/>`);
  p.push(`<rect x="${ox}" y="${oy}" width="${w}" height="${h}" fill="none" stroke="${st}" stroke-width="1"/>`);
  return `<svg viewBox="0 0 ${W} ${H}">${p.join('')}</svg>`;
}

// ---- 데이터 수집 ----
const GROUPS=['전체','식물','캐릭터','창문','집','소품','3D'];
function mainGroup(cat){
  cat=cat||''; if(/^집/.test(cat))return '집';
  if(/잎|몬스테라|포토스|산세|무늬종|완성식물|줄기|잎자루/.test(cat))return '식물';
  if(/화분|조명|아이템/.test(cat))return '소품'; return '소품';
}
let CARDS=[], cur='전체', qstr='';

async function load(){
  const [main,chars,wp]=await Promise.all([
    fetch('assets/manifest.json?v=1').then(r=>r.json()).catch(()=>({items:[]})),
    fetch('assets/characters/manifest.json?v=1').then(r=>r.json()).catch(()=>({items:[]})),
    fetch('data/window_presets.json?v=1').then(r=>r.json()).catch(()=>({presets:{}}))
  ]);
  // 식물/집/소품
  for(const it of (main.items||[])){
    const grp=mainGroup(it.category);
    const src=it.is_glb?null:('assets/'+it.path);
    CARDS.push({group:it.is_glb?'3D':grp, sub3d:grp, name:it.name_ko||it.file, cat:it.category, status:it.status,
      src, glb:it.is_glb?('assets/'+it.path):null, kind:it.is_glb?'glb':'img'});
  }
  // 캐릭터
  for(const c of (chars.items||[])){
    CARDS.push({group:'캐릭터', name:c.name_ko||c.name, cat:c.job, status:c.status, src:c.local, glb:null, kind:'img'});
  }
  // 창문(프리셋 SVG)
  const P=wp.presets||wp;
  for(const [id,w] of Object.entries(P)){
    if(id.startsWith('_'))continue;
    CARDS.push({group:'창문', name:(w.room||id)+' · '+id.replace('win_',''), cat:w.pattern, status:w.status, kind:'win', win:{...w}, id});
  }
  document.getElementById('tabs').innerHTML=GROUPS.map(g=>`<div class="tab${g==='전체'?' on':''}" data-g="${g}">${g}</div>`).join('');
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{cur=t.dataset.g;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));render();});
  document.getElementById('q').addEventListener('input',e=>{qstr=e.target.value.trim();render();});
  render();
}

function render(){
  const grid=document.getElementById('grid');
  const list=CARDS.filter(c=>{
    if(cur!=='전체' && c.group!==cur && !(cur==='3D'&&c.kind==='glb') ) return false;
    if(qstr){const s=(c.name+' '+(c.cat||'')).toLowerCase();if(!s.includes(qstr.toLowerCase()))return false;}
    return true;
  });
  document.getElementById('count').textContent=`${list.length}개 / 전체 ${CARDS.length}`;
  grid.innerHTML='';
  const frag=document.createDocumentFragment();
  for(const c of list){
    const card=document.createElement('div');card.className='card';
    let thumb;
    if(c.kind==='win') thumb=`<div class="thumb">${winSVG(c.win)}</div><span class="badge win">창</span>`;
    else if(c.kind==='glb') thumb=`<div class="thumb glb"><span>📦</span><span>GLB</span></div><span class="badge glb">3D</span>`;
    else thumb=`<div class="thumb"><img loading="lazy" src="${c.src}" onerror="this.parentNode.innerHTML='🖼️'"></div>${c.group==='캐릭터'?'<span class="badge char">캐릭</span>':''}`;
    card.innerHTML=thumb+`<div class="meta"><div class="nm">${c.name}</div><div class="tags">`+
      `${c.cat?`<span class="tg">${c.cat}</span>`:''}${c.status?`<span class="tg st">${c.status}</span>`:''}</div></div>`;
    if(c.kind==='glb') card.onclick=()=>openGLB(c.glb,c.name);
    else if(c.kind==='img') card.onclick=()=>window.open(c.src,'_blank');
    else if(c.kind==='win') card.onclick=()=>window.open('assets/house/_window_showroom.html','_blank');
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

// ---- GLB 모달 뷰어 ----
let mr,ms,mc,mmodel,manim,mclock,mraf;
function initModal(){
  const cv=document.getElementById('mcv');
  mr=new THREE.WebGLRenderer({canvas:cv,antialias:true});mr.setPixelRatio(Math.min(2,devicePixelRatio||1));
  mr.outputEncoding=THREE.sRGBEncoding;mr.shadowMap.enabled=true;
  ms=new THREE.Scene();ms.background=new THREE.Color(0x20222a);
  ms.add(new THREE.HemisphereLight(0xffffff,0x444455,1.0));
  const d=new THREE.DirectionalLight(0xffffff,1.2);d.position.set(4,8,6);ms.add(d);
  mc=new THREE.PerspectiveCamera(35,1,0.01,100);mclock=new THREE.Clock();
  document.getElementById('mclose').onclick=closeGLB;
  document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeGLB();});
  let drag=false,px=0,py=0,az=0.6,el=0.3,r=3,tx=0,ty=0;
  cv.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
  addEventListener('pointermove',e=>{if(!drag)return;az-=(e.clientX-px)*0.01;el=Math.max(-1.3,Math.min(1.4,el+(e.clientY-py)*0.008));px=e.clientX;py=e.clientY;});
  addEventListener('pointerup',()=>drag=false);
  cv.addEventListener('wheel',e=>{e.preventDefault();r*=(1+Math.sign(e.deltaY)*0.1);},{passive:false});
  window._mcam=()=>{const cx=Math.cos(el)*Math.sin(az)*r,cy=Math.sin(el)*r+ty,cz=Math.cos(el)*Math.cos(az)*r;mc.position.set(cx+tx,cy,cz);mc.lookAt(tx,ty,0);};
  window._mfit=(box)=>{const sz=new THREE.Vector3(),ct=new THREE.Vector3();box.getSize(sz);box.getCenter(ct);ty=ct.y;r=Math.max(sz.x,sz.y,sz.z)*2.2+0.5;};
}
function mloop(){mraf=requestAnimationFrame(mloop);const cv=document.getElementById('mcv');const w=cv.clientWidth,h=cv.clientHeight;if(cv.width!==w||cv.height!==h){mr.setSize(w,h,false);mc.aspect=w/h;mc.updateProjectionMatrix();}if(manim)manim.update(mclock.getDelta());window._mcam();mr.render(ms,mc);}
function openGLB(url,name){
  if(!mr)initModal();
  document.getElementById('modal').classList.add('on');
  document.getElementById('mlab').textContent=name+' · 불러오는 중…';
  if(mmodel){ms.remove(mmodel);mmodel=null;}manim=null;
  new THREE.GLTFLoader().load(url,g=>{
    mmodel=g.scene||g.scenes[0];
    const box=new THREE.Box3().setFromObject(mmodel);const ct=new THREE.Vector3();box.getCenter(ct);
    mmodel.position.sub(ct);mmodel.position.y+=(box.max.y-box.min.y)/2;   // 바닥 근처
    ms.add(mmodel);
    const box2=new THREE.Box3().setFromObject(mmodel);window._mfit(box2);
    if(g.animations&&g.animations.length){manim=new THREE.AnimationMixer(mmodel);g.animations.forEach(c=>manim.clipAction(c).play());}
    document.getElementById('mlab').textContent=name+(g.animations&&g.animations.length?` · 애니 ${g.animations.length}`:'');
  },undefined,e=>{document.getElementById('mlab').textContent='로드 실패: '+url;});
  if(!mraf)mloop();
}
function closeGLB(){document.getElementById('modal').classList.remove('on');}

load();
</script>
</body>
</html>
